<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COMMAND_CENTER // KEYGEN_AUTH</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    :root { --bg: #000a14; --cyan: #0ff; --dark-cyan: #00334d; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: var(--bg); color: var(--cyan); font-family: 'Share Tech Mono', monospace; overflow-x: hidden; }
    
    /* LOGIN SCREEN */
    #gen-login {
      position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: var(--bg); z-index: 1000;
    }
    #gen-login h1 { font-size: 3rem; text-shadow: 0 0 15px var(--cyan); margin-bottom: 2rem; }
    #gen-pass {
      background: rgba(0, 50, 77, 0.3); border: 1px solid var(--cyan); color: var(--cyan);
      font-family: inherit; font-size: 2rem; padding: 15px; text-align: center; outline: none;
      width: 400px; box-shadow: 0 0 20px rgba(0, 255, 255, 0.2); transition: 0.3s;
    }
    #gen-pass:focus { box-shadow: 0 0 30px var(--cyan); }
    #gen-pass::placeholder { color: var(--dark-cyan); }
    
    /* APP CONTENT */
    #app-content { display: none; padding: 40px; }
    header { border-bottom: 2px solid var(--cyan); padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: flex-end; }
    h1 { font-size: 2.5rem; letter-spacing: 3px; text-shadow: 0 0 10px var(--cyan); }
    .stats { font-size: 1.2rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; }
    .agent-card { border: 1px solid var(--dark-cyan); background: rgba(0, 50, 77, 0.3); padding: 20px; transition: all 0.3s; }
    .agent-card:hover { border-color: var(--cyan); box-shadow: 0 0 15px rgba(0, 255, 255, 0.2); }
    .agent-id { font-size: 1.4rem; font-weight: bold; margin-bottom: 15px; border-bottom: 1px dashed var(--dark-cyan); padding-bottom: 5px; color: #fff; text-shadow: 0 0 5px #fff; }
    .label { font-size: 0.8rem; color: #88ccee; margin-top: 10px; }
    .static-pass { font-size: 1.2rem; color: #ff00ff; letter-spacing: 2px; text-shadow: 0 0 5px #ff00ff; margin-bottom: 10px; }
    .code-display { font-size: 2.5rem; letter-spacing: 5px; color: #0f0; text-shadow: 0 0 10px #0f0; margin: 5px 0; }
    .timer { font-size: 0.9rem; color: #88ccee; margin-top: 10px; }
    .bar-bg { width: 100%; height: 5px; background: var(--dark-cyan); margin-top: 5px; }
    .bar-fill { height: 100%; background: #0f0; width: 100%; transition: width 1s linear; }
    .custom-gen { margin-top: 40px; padding: 20px; border: 1px dashed var(--cyan); }
    .custom-gen input { background: transparent; border: none; border-bottom: 1px solid var(--cyan); color: var(--cyan); font-family: inherit; font-size: 1.2rem; padding: 5px; outline: none; width: 250px; text-transform: uppercase; }
  </style>
</head>
<body>

  <!-- PASSWORD SCREEN -->
  <div id="gen-login">
    <h1>SECURE_KEYGEN_AUTH</h1>
    <input type="password" id="gen-pass" placeholder="MASTER PASSWORD" autocomplete="off" autofocus>
  </div>

  <!-- MAIN GENERATOR APP -->
  <div id="app-content">
    <header>
      <h1>COMMAND_CENTER // KEYGEN</h1>
      <div class="stats">
        <div>ACTIVE AGENT NODES: <span id="node-count">10,492</span></div>
        <div>ENCRYPTION: AES-256-GCM</div>
      </div>
    </header>

    <div class="custom-gen">
      <h3>GENERATE CUSTOM AGENT KEY</h3><br>

        <div class="label">STATIC PASSWORD (PERMANENT)</div>
        <div class="static-pass" id="custom-static">----------------</div>
